# 💾 1. 自动绑定您之前全线变绿、完美 Running 的 local-path 存储驱动
prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "local-path" 
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# 📊 2. 挂载 Grafana 数据卷并对齐国内镜像名字
grafana:
  persistence:
    enabled: true
    storageClassName: "local-path"
    size: 5Gi
  # 🌟🌟 核心修复参数：彻底关闭导致报错卡死的 initChownData 初始化容器 🌟🌟
  initChownData:
    enabled: false
  # 🌟🌟 辅助安全修复：确保 Grafana 进程不使用非特权高难度 ID 去强行读写本地卷
  securityContext: {}
  podSecurityContext: {}
# 🚨 3. 挂载 Alertmanager 告警卷，并配置稳定的 PrometheusAlert 飞书路由
alertmanager:
  enabled: true
  alertmanagerSpec:
    volumeClaimTemplate:
      spec:
        storageClassName: "local-path"
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
  # 📣 核心修正：配置 Alertmanager 真正能够识别的内网 8080 端口与完整路径
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10m
      group_interval: 5s
      repeat_interval: 10m
      receiver: 'web.hook.prometheusalert'
    receivers:
    - name: 'web.hook.prometheusalert'
      webhook_configs:
      # ⚠️ 修正后的完整内网 URL，必须包含 :8080 端口与 /prometheusalert 后缀
      # 请记得把末尾的“你的飞书群Webhook全路径”替换为您群机器人的实际 Token
        - url: 'http://prometheus-alert-center.default.svc.cluster.local:8080/prometheusalert?type=fs&prometheus-fs&fsurl=https://open.feishu.cn/open-apis/bot/v2/hook/90f43268-45ff-4016-8a0f-8ab52898b89c,https://open.feishu.cn/open-apis/bot/v2/hook/3eeade21-583d-4fa8-9f0c-6d0bf8a86278'

